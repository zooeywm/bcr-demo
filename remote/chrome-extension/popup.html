<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>BCR Demo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="layout">
    <h1>BCR Demo</h1>
    <p id="tab-url" class="tab-url">正在读取当前标签页...</p>
    <button id="open-url" type="button">在 Qt 中打开当前页</button>
    <button id="open-fullscreen" type="button">打开当前页并整屏</button>
    <button id="enter-fullscreen" type="button">仅切到整屏</button>
    <button id="exit-fullscreen" type="button">退出整屏</button>
    <button id="ping" type="button">测试连接</button>
    <pre id="status" class="status">等待操作</pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
